<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý TikZ & Ảnh</title>
    <link rel="stylesheet" type="text/css" href="https://tikzjax.com/v1/fonts.css">
    <script src="https://tikzjax.com/v1/tikzjax.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; }
        .container { display: flex; flex-direction: column; gap: 15px; }
        textarea { width: 100%; height: 150px; font-family: monospace; }
        #preview-area { border: 1px solid #ccc; padding: 10px; min-height: 200px; }
        .warning { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Trình quản lý Code TikZ</h2>
    
    <input type="file" id="imageInput" accept="image/*">
    <div id="statusMessage"></div>

    <textarea id="tikzCode" placeholder="Nhập mã TikZ vào đây..."></textarea>
    
    <button id="compileBtn">Biên dịch (Compile) TikZ</button>
    <button id="uploadBtn" disabled>Lưu lên GitHub</button>

    <h3>Kết quả biên dịch:</h3>
    <div id="preview-area"></div>
</div>

<script src="app.js"></script>
</body>
</html>
